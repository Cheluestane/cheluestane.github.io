description: |
  # Character design of Momo
  #### This character design is still a work in progress.<br> It's one of my on-going personal projects.

  Michael Ende's book Momo is one of my favorites.
  
  The two most difficult parts of this character where her face and her hair.
  For her face I wanted something looking like Cartoon Saloon.
  In the book her hair is "a curly black mop".
   
  As far as I've seen there has never been a 2D animated character with curly hair.
